<!DOCTYPE html>
<html>
<head>
    <title>Faculty Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="navbar">
    <h2>📋 Faculty Dashboard</h2>

    <div class="nav-right">
        <span>{{ user }}</span>
        <a href="/logout"><button class="logout-btn">Logout</button></a>
    </div>
</div>

<div class="main-container">

    <div class="glass-card">

        <h3>📝 Apply for Leave</h3>

        <!-- ✅ IMPORTANT: enctype added -->
        <form id="leaveForm" enctype="multipart/form-data">

        <!-- ROW 1 -->
        <div class="form-row">

            <div>
                <label>Department</label>
                <select id="department" name="department" onchange="updateFaculty()">
                    <option value="">-- Select Department --</option>
                </select>
            </div>

            <div>
                <label>Name</label>
                <select id="name" name="name" onchange="autoFillEmail()">
                    <option value="">-- Select Name --</option>
                </select>
            </div>

        </div>

        <!-- ROW 2 -->
        <div class="form-row">

            <div>
                <label>Designation</label>
                <select id="designation" name="designation">
                    <option>Assistant Professor</option>
                    <option>Associate Professor</option>
                    <option>Head of the Department</option>
                </select>
            </div>

            <div>
                <label>Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>

        </div>

        <!-- ROW 3 -->
        <div class="form-row">

            <div>
                <label>Mobile</label>
                <input type="tel" id="mobile" name="mobile" placeholder="Enter mobile number" maxlength="10">
                <small style="color:gray;">You will receive leave status on email & mobile</small>
            </div>

            <div>
                <label>Leave Type</label>
                <select id="leaveType" name="leaveType" onchange="toggleProof()">
                    <option>CL</option>
                    <option>LWP</option>
                    <option>ML</option>
                    <option>EL</option>
                    <option>DL</option>
                    <option>SP</option>
                </select>
            </div>

        </div>

        <!-- ✅ PROOF UPLOAD -->
        <div id="proofSection" style="display:none; margin-top:10px;">
            <label>Upload Proof (Required for ML / DL)</label>
            <!-- ✅ IMPORTANT: name added -->
            <input type="file" id="proof" name="proof">
        </div>

        <!-- ROW 4 -->
        <div class="form-row">

            <div>
                <label>From Date</label>
                <input type="date" id="fromDate" name="fromDate" required>
            </div>

            <div>
                <label>To Date</label>
                <input type="date" id="toDate" name="toDate" required>
            </div>

        </div>

        <label>Reason</label>
        <textarea id="reason" name="reason"></textarea>

        <label>Alternate Staff</label>
        <select id="altStaff" name="altStaff">
            <option value="">-- Select Alternate Staff --</option>
        </select>

        <br>

        <!-- Keep type=button because we will use JS -->
        <button type="button" class="primary-btn" onclick="submitLeave()">
            🚀 Submit Leave
        </button>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
// ✅ SHOW/HIDE PROOF FIELD
function toggleProof() {
    const leaveType = document.getElementById("leaveType").value;
    const proofSection = document.getElementById("proofSection");

    if (leaveType === "ML" || leaveType === "DL") {
        proofSection.style.display = "block";
    } else {
        proofSection.style.display = "none";
    }
}
</script>

</body>
</html>
